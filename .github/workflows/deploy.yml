name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test
      - name: Deploy authoritative game API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --var DEPLOY_VERSION:${{ github.sha }}
      - name: Resolve workers.dev endpoint
        id: api
        env:
          CF_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          response=$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain")
          subdomain=$(jq -er '.result.subdomain' <<<"${response}")
          echo "url=https://monopoly-game-api.${subdomain}.workers.dev" >> "${GITHUB_OUTPUT}"
      - name: Build PWA
        env:
          GITHUB_ACTIONS: 'true'
          VITE_API_BASE: ${{ steps.api.outputs.url }}
        run: npm run build --workspace @monopoly/web && npm run validate:pwa
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
      - name: Deploy GitHub Pages
        id: pages
        uses: actions/deploy-pages@v4
